<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | CareerGo Quizzes</title>
  <meta name="description" content="Register an account on CareerGo Quizzes to create custom questions assessments, customize profile avatar colors, and view score histories.">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    /* Local centering styles */
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height) - 150px);
      padding: 40px 24px;
    }
    .auth-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 480px;
      padding: 40px;
      box-shadow: var(--shadow-xl);
      text-align: center;
    }
    .auth-header {
      margin-bottom: 24px;
    }
    .auth-header h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    /* Avatar color picker styles */
    .color-picker-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-main);
      text-align: left;
    }
    .color-bubbles-row {
      display: flex;
      gap: 12px;
      justify-content: flex-start;
      margin-bottom: 24px;
      margin-top: 4px;
    }
    .avatar-color-bubble {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform var(--transition-fast);
    }
    .avatar-color-bubble:hover {
      transform: scale(1.15);
    }
    .avatar-color-bubble.selected {
      border-color: white;
      box-shadow: 0 0 0 2px var(--primary);
    }
  </style>
</head>
<body>

  <!-- HEADER NAVBAR -->
  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo-wrapper">
        <div class="logo-icon">⚡</div>
        <span>CareerGo<span style="color: var(--text-main);">Quizzes</span></span>
      </a>
      
      <nav class="nav-menu" id="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="browse.html" class="nav-link">Browse Quizzes</a>
        <a href="create.html" class="nav-link">Create Quiz</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </nav>

      <div class="nav-actions" id="nav-actions">
        <button class="btn-icon">🌓</button>
      </div>

      <div class="mobile-nav-toggle" id="mobile-nav-toggle">☰</div>
    </div>
  </header>

  <!-- AUTH REGISTRATION CONTENT -->
  <main class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon" style="margin: 0 auto; width: 48px; height: 48px; font-size: 1.5rem;">⚡</div>
        <h2>Create Account</h2>
        <p class="text-muted" style="font-size: 0.95rem;">Join CareerGo Quizzes to save your progress</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="e.g. Alex Morgan" required>
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
          </div>
          
          <div class="form-group">
            <label for="reg-confirm-password">Confirm Password</label>
            <input type="password" id="reg-confirm-password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <!-- Custom Avatar Profile HSL Color Bubble Selector -->
        <div>
          <span class="color-picker-label">Choose Avatar Banner Color</span>
          <div class="color-bubbles-row">
            <div class="avatar-color-bubble selected" data-color="#7c3aed" style="background-color: #7c3aed;"></div>
            <div class="avatar-color-bubble" data-color="#3b82f6" style="background-color: #3b82f6;"></div>
            <div class="avatar-color-bubble" data-color="#10b981" style="background-color: #10b981;"></div>
            <div class="avatar-color-bubble" data-color="#f59e0b" style="background-color: #f59e0b;"></div>
            <div class="avatar-color-bubble" data-color="#ec4899" style="background-color: #ec4899;"></div>
            <div class="avatar-color-bubble" data-color="#ef4444" style="background-color: #ef4444;"></div>
          </div>
          <input type="hidden" id="reg-avatar-color" value="#7c3aed">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 8px;">
          Create Account
        </button>
      </form>

      <div style="margin-top: 24px; font-size: 0.92rem;">
        <span class="text-muted">Already have an account? </span>
        <a href="login.html" style="color: var(--primary); font-weight: 700;">Sign In</a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="margin-top: auto;">
    <div class="container footer-bottom">
      &copy; 2026 CareerGo Quizzes. Built with Antigravity for modern web evaluation.
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
