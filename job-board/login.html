<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CareerGo Job Board</title>
  <meta name="description" content="Access your CareerGo account. Sign in to apply for job opportunities or recruit top-tier talent.">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Dynamic Header Container -->
  <header>
    <div class="container nav-container">
      <!-- Generated by app.js -->
    </div>
  </header>

  <!-- Login Main Content -->
  <main class="auth-page-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>Welcome Back</h2>
        <p>Login to manage your jobs or applications</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="name@company.com" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="auth-meta">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="#" class="forgot-pass" onclick="showToast('Password recovery is simulated. Use demo buttons below!', 'info')">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up now</a>
      </div>

      <!-- Demo Accounts Credentials Panel -->
      <div class="demo-creds">
        <h4 class="demo-creds-title">Demo Credentials</h4>
        <div class="demo-btn-group">
          <button id="demoCandidateLogin" class="demo-login-btn" type="button">
            <i class="fas fa-user-tie"></i> Candidate Demo
          </button>
          <button id="demoEmployerLogin" class="demo-login-btn" type="button">
            <i class="fas fa-building"></i> Employer Demo
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('action') === 'post') {
        setTimeout(() => {
          showToast('Please sign in or register to publish a new job opening!', 'warning');
        }, 300);
      }
    });
  </script>
</body>
</html>
