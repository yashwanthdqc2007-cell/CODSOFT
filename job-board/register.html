<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CareerGo Job Board</title>
  <meta name="description" content="Join CareerGo today. Create a profile, upload your resume, or post job listings.">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Dynamic Header Container -->
  <header>
    <div class="container nav-container">
      <!-- Generated by app.js -->
    </div>
  </header>

  <!-- Register Main Content -->
  <main class="auth-page-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <h2>Create an Account</h2>
        <p>Get started with CareerJet in minutes</p>
      </div>

      <!-- Role Selection Toggle -->
      <div class="role-toggle-group">
        <button type="button" class="role-toggle-btn active" data-role="candidate">
          <i class="fas fa-user-tie"></i>
          Candidate
        </button>
        <button type="button" class="role-toggle-btn" data-role="employer">
          <i class="fas fa-building"></i>
          Employer
        </button>
      </div>

      <form class="auth-form" id="registerForm">
        <!-- Hidden input for selected role -->
        <input type="hidden" id="userRole" value="candidate">

        <div class="form-group">
          <label for="registerName" id="nameLabel">Full Name</label>
          <input type="text" id="registerName" class="form-control" placeholder="e.g. John Doe" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="registerEmail">Email Address</label>
          <input type="email" id="registerEmail" class="form-control" placeholder="e.g. john@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" class="form-control" placeholder="At least 6 characters" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword">Confirm Password</label>
          <input type="password" id="registerConfirmPassword" class="form-control" placeholder="Repeat password" required autocomplete="new-password">
        </div>

        <div class="auth-meta">
          <label class="remember-me">
            <input type="checkbox" id="registerTerms" required>
            I agree to the Terms & Conditions
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in here</a>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
